apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: enterprise-inventory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: mihir252731/enterprise-inventory-platform-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: enterprise-inventory-config
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: enterprise-inventory-config
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: enterprise-inventory-secret
                  key: POSTGRES_PASSWORD
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: enterprise-inventory-config
                  key: SPRING_DATA_REDIS_HOST
            - name: SPRING_DATA_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: enterprise-inventory-config
                  key: SPRING_DATA_REDIS_PORT
            - name: APP_CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: enterprise-inventory-config
                  key: APP_CORS_ALLOWED_ORIGINS
            - name: APP_JWT_EXPIRATION_MS
              valueFrom:
                configMapKeyRef:
                  name: enterprise-inventory-config
                  key: APP_JWT_EXPIRATION_MS
            - name: APP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: enterprise-inventory-secret
                  key: APP_JWT_SECRET
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: enterprise-inventory
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
