apiVersion: v1
kind: ConfigMap
metadata:
  name: enterprise-inventory-config
  namespace: enterprise-inventory
data:
  POSTGRES_DB: cloud_inventory
  POSTGRES_USER: postgres
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cloud_inventory
  SPRING_DATASOURCE_USERNAME: postgres
  SPRING_DATA_REDIS_HOST: redis
  SPRING_DATA_REDIS_PORT: "6379"
  APP_JWT_EXPIRATION_MS: "86400000"
  APP_CORS_ALLOWED_ORIGINS: http://localhost:30000
